<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KovaaK's Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>KovaaK's Tracker</h1>
    <p>Track your aim training sessions and monitor your progress.</p>
  </header>

  <main>
    <section>
      <h2>Add Scenario</h2>

      <form id="sessionForm">
        <input type="text" id="scenario" placeholder="Scenario name">
        <input type="number" id="score" placeholder="Score">

        <select id="category">
          <option value="">Select Category</option> 
          <option value="Tracking">Tracking</option>
          <option value="Clicking">Clicking</option>
          <option value="Switching">Switching</option>
        </select>

        <input type="text" id="subCategory" placeholder="Subcategory">

        <button type="submit">Add Scenario/Task</button>
      </form>

        <button id="completeSessionBtn" type="button">Complete Session</button>

        <input type ="text" id="sessionLength" placeholder="Session length ex: 15 mins">

    </section>

    <section>
        <h2>Current Session</h2>
        <div id="currentSessionList"></div>
    </section>

    <section>
      <h2>Session History</h2>
      <div id="sessionList"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
